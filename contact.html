<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Get in touch with me by filling out the basic contact form.">
    <title>My First Website - Contact</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>My Personal Website</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="services.html">Services</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <main class="container">
        <h2>Contact Me</h2>
        <p>If you have any questions or just want to chat, fill out the form below or send me an email.</p>
        
        <p><strong>Email:</strong> myemail@example.com</p>
        <p><strong>Location:</strong> Metro Manila, Philippines</p>

        <hr>

        <form id="contactForm">
            <div class="form-group">
                <label for="username">Name:</label>
                <input type="text" id="username" name="username">
            </div>
            
            <div class="form-group">
                <label for="useremail">Email Address:</label>
                <input type="text" id="useremail" name="useremail">
            </div>
            
            <div class="form-group">
                <label for="usermessage">Message:</label>
                <textarea id="usermessage" name="usermessage" rows="4"></textarea>
            </div>
            
            <button type="submit">Submit Form</button>
        </form>
    </main>

    <footer>
        <p>Copyright 2026 - My Simple Website</p>
    </footer>

    <script>
        document.getElementById('contactForm').onsubmit = function(event) {
            var name = document.getElementById('username').value;
            var email = document.getElementById('useremail').value;
            var message = document.getElementById('usermessage').value;

            if (name === "" || email === "" || message === "") {
                alert("Please fill out all the fields before submitting.");
                event.preventDefault();
                return false;
            }

            if (email.indexOf("@") === -1) {
                alert("Please enter a valid email address with an @ symbol.");
                event.preventDefault();
                return false;
            }

            alert("Thank you! Your form has been submitted successfully.");
        };
    </script>

</body>
</html>
